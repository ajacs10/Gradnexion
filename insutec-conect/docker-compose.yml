services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: insutec_connect
      POSTGRES_USER: insutec_connect
      POSTGRES_PASSWORD: insutec_connect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insutec_connect -d insutec_connect"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
    environment:
      PORT: 4000
      PUBLIC_BASE_URL: http://localhost:4000
      FRONTEND_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://insutec_connect:insutec_connect@db:5432/insutec_connect
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      args:
        VITE_API_URL: http://localhost:4000
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "5180:80"

volumes:
  postgres_data:
  uploads_data:
